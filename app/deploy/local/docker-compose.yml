services:
  mongo:
    image: mongo:7
    container_name: ai-task-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: ai-task-redis
    ports:
      - "6379:6379"

  api:
    build:
      context: ../..
      dockerfile: docker/api/Dockerfile
    container_name: ai-task-api
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/ai_task_platform
      JWT_SECRET: dev_secret_key_123
      JWT_EXPIRES_IN: 7d
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CORS_ORIGIN: http://localhost:5173
    depends_on:
      - mongo
      - redis

  worker:
    build:
      context: ../..
      dockerfile: docker/worker/Dockerfile
    container_name: ai-task-worker
    environment:
      MONGO_URI: mongodb://mongo:27017/ai_task_platform
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_NAME: task-processing
    depends_on:
      - mongo
      - redis
      - api

volumes:
  mongo_data: