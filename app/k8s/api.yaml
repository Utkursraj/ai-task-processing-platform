apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-task-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-task-api
  template:
    metadata:
      labels:
        app: ai-task-api
    spec:
      containers:
        - name: api
          image: utkurs/ai-task-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: NODE_ENV
              value: "development"
            - name: PORT
              value: "5000"
            - name: MONGO_URI
              value: "mongodb://mongo:27017/ai_task_platform"
            - name: JWT_SECRET
              value: "dev_secret_key_123"
            - name: JWT_EXPIRES_IN
              value: "7d"
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: CORS_ORIGIN
              value: "http://localhost:5173"
---
apiVersion: v1
kind: Service
metadata:
  name: ai-task-api
spec:
  type: NodePort
  selector:
    app: ai-task-api
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30080